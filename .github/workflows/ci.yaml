name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build
      run: go build ./cmd/kaudy/

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v ./...
